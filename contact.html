<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
    <script src="./include/header.js"></script>

    <div class="info">
        <!--benner-->
        <img class="benner_img" src="./img/banner.jpg" alt="">
    </div>
    <div class="container mt-5">
        <div class="row">
            <div class="column">
                <h1>GET IN TOUCH</h1>
                <h1 style="color: red;">TIKI SOUB</h1>
            </div>
            <div class="column">
                <span>Benieuwd hoe je Japanse smaken echt tot hun recht laat komen en je gerechten perfectioneert? We
                    helpen en inspireren je graag.</span>
            </div>
        </div>
        <div class="form mt-5">
            <div class="row g-5 p-3">
                <div class="col-md-5">
                    <div class="contact-info bg-dark text-white p-5 rounded h-100 shadow">
                        <h4 class="mb-4">Contact Information</h4>
                        <p><i class="bi bi-geo-alt-fill text-warning me-2"></i> 123 Soup Bowl Ave,phnom penh</p>
                        <p><i class="bi bi-telephone-fill text-warning me-2"></i>0965096665</p>
                        <p><i class="bi bi-envelope-fill text-warning me-2"></i>tiki@soup.com</p>
                        <div class="mt-5">
                            <a href="https://www.instagram.com/yamafood/" class="text-white me-3 fs-4"><i class="bi bi-instagram"></i></a>
                            <a href="https://www.facebook.com/YamaFood/" class="text-white me-3 fs-4"><i class="bi bi-facebook"></i></a>
                            <a href="#" class="text-white fs-4"><i class="bi bi-twitter-x"></i></a>
                        </div>
                    </div>
                </div>  
                <div class="col-md-7">
                    <form class="contact-form p-4 border rounded shadow-sm bg-white">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter user name">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter email user">
                            </div>
                            <div class="col-12">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" placeholder="How can we help?">
                            </div>
                            <div class="col-12">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="5"
                                    placeholder="Write your message here..."></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-dark w-100 py-2"><i class="bi bi-send"></i> Send
                                    Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div>
            <iframe class="maps mt-5 p-3"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3994125.279871216!2d104.98244509999999!3d12.145439549999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x310787bfd4dc3743%3A0xe4b7bfe089f41253!2z4Z6A4Z6Y4Z-S4Z6W4Z674Z6H4Z62!5e0!3m2!1skm!2skh!4v1781504152122!5m2!1skm!2skh"
                width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

    </div>

    <script src="./include/footer.js"></script>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
